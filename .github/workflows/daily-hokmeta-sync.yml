name: Daily HOKMeta Sync

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Run full Camp sync with counters"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-hokmeta-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      D1_DATABASE_NAME: hokmeta-heroes
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Sync Camp data
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            npm run sync-camp
          else
            npm run sync-camp -- --skip-counters
          fi

      - name: Save daily hero metrics to D1
        run: node scripts/snapshot-to-d1.js

      - name: Generate trend data from D1
        run: npm run sync-trends

      - name: Verify GSC target heroes
        run: npm run qa:gsc-targets

      - name: Build static site
        run: npm run build

      - name: Commit generated updates
        run: |
          git config user.name "hokmeta-bot"
          git config user.email "bot@hokmeta.com"
          git add data public/api
          git diff --cached --quiet || git commit -m "chore: daily HOKMeta data sync"
          git push
